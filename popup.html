<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- TOP BAR -->
    <header class="topbar">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="7.5" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="9" y1="4" x2="9" y2="9.5" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="9" y1="9.5" x2="12" y2="12" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Tracker</span>
      </div>
      <div class="topbar-actions">
        <button class="btn-icon" id="exportBtn" title="Export Report">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 1v9M4 7l3.5 3.5L11 7M2 12h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="btn-icon" id="addTeamBtn" title="Add Team">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 2v11M2 7.5h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- TEAM TABS -->
    <div class="team-tabs-wrap">
      <div class="team-tabs" id="teamTabs"></div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="content" id="mainContent">
      <div class="empty-state" id="emptyState">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="17" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="4 3"/>
          <path d="M20 10v10.5M13 17l7 3.5 7-3.5" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p>No teams yet.<br/>Click <strong>+</strong> to create one.</p>
      </div>
      <div class="tasks-panel" id="tasksPanel" style="display:none">
        <div class="tasks-header">
          <span class="tasks-title" id="currentTeamName"></span>
          <button class="btn-add-task" id="addTaskBtn">+ Add Task</button>
        </div>
        <div class="task-list" id="taskList"></div>
      </div>
    </main>
  </div>

  <!-- MODAL: Add Team -->
  <div class="modal-overlay" id="teamModal">
    <div class="modal">
      <div class="modal-header">
        <span>New Team</span>
        <button class="modal-close" data-close="teamModal">✕</button>
      </div>
      <label class="field-label">Team Name</label>
      <input class="field-input" id="teamNameInput" placeholder="e.g. Design, Backend…" maxlength="40"/>
      <div class="modal-actions">
        <button class="btn-ghost" data-close="teamModal">Cancel</button>
        <button class="btn-primary" id="saveTeamBtn">Create Team</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Add / Edit Task -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <div class="modal-header">
        <span id="taskModalTitle">New Task</span>
        <button class="modal-close" data-close="taskModal">✕</button>
      </div>
      <label class="field-label">Task Name</label>
      <input class="field-input" id="taskNameInput" placeholder="What did you work on?" maxlength="80"/>
      <label class="field-label" style="margin-top:12px">Date</label>
      <input class="field-input" id="taskDateInput" type="date"/>
      <label class="field-label" style="margin-top:12px">Time Spent</label>
      <div class="time-row">
        <div class="time-field">
          <input class="field-input time-input" id="taskHours" type="number" min="0" max="23" placeholder="0"/>
          <span class="time-unit">h</span>
        </div>
        <div class="time-field">
          <input class="field-input time-input" id="taskMinutes" type="number" min="0" max="59" placeholder="0"/>
          <span class="time-unit">m</span>
        </div>
      </div>
      <label class="field-label" style="margin-top:12px">Notes <span style="opacity:.4">(optional)</span></label>
      <textarea class="field-input" id="taskNotes" placeholder="Any notes…" rows="2" style="resize:vertical"></textarea>
      <div class="modal-actions">
        <button class="btn-ghost" data-close="taskModal">Cancel</button>
        <button class="btn-primary" id="saveTaskBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Export -->
  <div class="modal-overlay" id="exportModal">
    <div class="modal modal-wide">
      <div class="modal-header">
        <span>Export Report</span>
        <button class="modal-close" data-close="exportModal">✕</button>
      </div>
      <label class="field-label">Select Team</label>
      <select class="field-input" id="exportTeamSelect">
        <option value="all">All Teams</option>
      </select>
      <label class="field-label" style="margin-top:12px">Date Range</label>
      <div class="date-range-row">
        <input class="field-input" id="exportFrom" type="date"/>
        <span class="range-sep">→</span>
        <input class="field-input" id="exportTo" type="date"/>
      </div>
      <div class="export-preview" id="exportPreview"></div>
      <div class="modal-actions">
        <button class="btn-ghost" data-close="exportModal">Cancel</button>
        <button class="btn-secondary" id="previewExportBtn">Preview</button>
        <button class="btn-primary" id="downloadCsvBtn">Download CSV</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Add Time Entry on existing task -->
  <div class="modal-overlay" id="logModal">
    <div class="modal">
      <div class="modal-header">
        <span>Add Time Entry</span>
        <button class="modal-close" data-close="logModal">✕</button>
      </div>
      <div class="log-task-name" id="logTaskName"></div>
      <label class="field-label">Date</label>
      <input class="field-input" id="logDateInput" type="date"/>
      <label class="field-label" style="margin-top:12px">Time Spent</label>
      <div class="time-row">
        <div class="time-field">
          <input class="field-input time-input" id="logHours" type="number" min="0" max="23" placeholder="0"/>
          <span class="time-unit">h</span>
        </div>
        <div class="time-field">
          <input class="field-input time-input" id="logMinutes" type="number" min="0" max="59" placeholder="0"/>
          <span class="time-unit">m</span>
        </div>
      </div>
      <label class="field-label" style="margin-top:12px">Notes <span style="opacity:.4">(optional)</span></label>
      <textarea class="field-input" id="logNotes" placeholder="Any notes…" rows="2" style="resize:vertical"></textarea>
      <div class="modal-actions">
        <button class="btn-ghost" data-close="logModal">Cancel</button>
        <button class="btn-primary" id="saveLogBtn">Add Entry</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
